<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#141824" />
    <title>PadBot Drive</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Connection">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <h1>PadBot Drive</h1>
            <p id="statusText">Disconnected</p>
          </div>
        </div>
        <div class="connection-actions">
          <button id="connectButton" class="icon-button primary-action" aria-label="Connect" title="Connect">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M9 7V3" />
              <path d="M15 7V3" />
              <path d="M7 11h10" />
              <path d="M8 7h8v6a4 4 0 0 1-8 0Z" />
              <path d="M12 17v4" />
            </svg>
          </button>
          <button id="disconnectButton" class="icon-button" aria-label="Disconnect" title="Disconnect" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M9 7V3" />
              <path d="M15 7V3" />
              <path d="M7 11h10" />
              <path d="M8 7h8v3a4 4 0 0 1-6.8 2.8" />
              <path d="M12 17v4" />
              <path d="M3 3l18 18" />
            </svg>
          </button>
          <button id="settingsToggle" class="icon-button" aria-label="Settings" title="Settings" aria-expanded="false" aria-controls="settingsMenu">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9c.3.6.9 1 1.6 1h.2a2 2 0 1 1 0 4H21c-.7 0-1.3.4-1.6 1Z" />
            </svg>
          </button>
        </div>
      </section>

      <input id="protocolMode" type="hidden" value="auto" />
      <input id="serviceUuid" type="hidden" value="0xfff0" />
      <input id="writeUuid" type="hidden" value="" />
      <input id="notifyUuid" type="hidden" value="" />

      <section id="settingsMenu" class="settings-menu" aria-label="Robot settings" hidden>
        <div class="utility-grid">
          <button class="utility-button" data-command="?">Battery</button>
          <button class="utility-button" data-command="&amp;">Infrared</button>
          <button class="utility-button" data-command=":">Info</button>
          <button class="utility-button" data-command="&lt;">Dock</button>
          <button class="utility-button" data-command="&gt;">Undock</button>
        </div>
      </section>

      <section class="control-layout">
        <section class="drive-surface" aria-label="Drive controls">
          <div class="head-controls">
            <button class="pad-button small" data-command="X5" data-hold="true" aria-label="Head up">Head Up</button>
            <button class="pad-button small" data-command="XA" data-hold="true" aria-label="Head down">Head Down</button>
          </div>

          <div class="dpad" aria-label="Movement">
            <button class="pad-button corner" data-command="XG" data-hold="true">Fwd Left</button>
            <button class="pad-button main" data-command="X1" data-hold="true">Forward</button>
            <button class="pad-button corner" data-command="XK" data-hold="true">Fwd Right</button>

            <button class="pad-button main" data-command="X6" data-hold="true">Left</button>
            <button class="stop-button" data-command="0">Stop</button>
            <button class="pad-button main" data-command="X7" data-hold="true">Right</button>

            <button class="pad-button corner" data-command="XO" data-hold="true">Back Left</button>
            <button class="pad-button main" data-command="X4" data-hold="true">Backward</button>
            <button class="pad-button corner" data-command="XS" data-hold="true">Back Right</button>
          </div>

          <div class="segmented speed-strip" aria-label="Speed">
            <button class="speed-button" data-command="D" data-speed="1">Low</button>
            <button class="speed-button active" data-command="E" data-speed="2">Medium</button>
            <button class="speed-button" data-command="W" data-speed="3">Fast</button>
          </div>
        </section>

        <aside class="panel command-panel" aria-label="Command log">
          <div class="telemetry">
            <div>
              <span>Device</span>
              <strong id="deviceName">None</strong>
            </div>
            <div>
              <span>Service</span>
              <strong id="serviceState">-</strong>
            </div>
            <div>
              <span>Write</span>
              <strong id="writeState">-</strong>
            </div>
          </div>

          <div class="log-wrap">
            <div class="log-title">Log</div>
            <ol id="logList"></ol>
          </div>
        </aside>
      </section>
    </main>

    <script src="./app.js?v=8" type="module"></script>
  </body>
</html>
